<!DOCTYPE html>
<html>
<head>
    <title>DAA Code Hub</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin: 20px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin: 15px auto;
            width: 400px;
            border-radius: 10px;
        }

        button {
            margin: 5px;
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        pre {
            background: #020617;
            padding: 15px;
            margin: 20px;
            overflow-x: auto;
            text-align: left;
        }
    </style>
</head>

<body>

<h1>🚀 DAA Code Hub</h1>

<!-- Bellman Ford -->
<div class="card">

    <button onclick="copyFile('Cpp/BF5.cpp')">C++</button>
    <button onclick="copyFile('python/BF5.py')">Python</button>
    <button onclick="copyFile('Java/BF5.java')">Java</button>
</div>

<!-- Code display -->
<pre id="codeBox">Click any button to view & copy code...</pre>

<script>
async function copyFile(path) {
    try {
        const response = await fetch(path);
        const text = await response.text();

        document.getElementById("codeBox").innerText = text;

        await navigator.clipboard.writeText(text);
        alert("✅ Code copied!");
    } catch (err) {
        alert("❌ Error: " + err);
    }
}
</script>

</body>
</html>
